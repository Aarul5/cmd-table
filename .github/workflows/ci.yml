name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (e.g. cmd-table)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Syntax check
        run: |
          shopt -s globstar
          for f in packages/*/dist/**/*.js; do
            node -c "$f"
          done

      - name: Run all tests
        run: pnpm -r test

      - name: CLI smoke test
        run: node packages/cmd-table/dist/cli.js --help

  docs-check:
    name: Docs check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check each package has a README
        run: |
          missing=0
          for pkg in packages/*/; do
            name=$(node -e "try{const p=require('./$pkg/package.json');process.stdout.write(p.private?'skip':p.name)}catch(e){process.stdout.write('skip')}")
            if [ "$name" = "skip" ]; then
              continue
            fi
            if [ ! -f "$pkg/README.md" ]; then
              echo "❌ Missing README.md in $pkg (package: $name)"
              missing=1
            else
              echo "✅ $pkg has README.md"
            fi
          done
          exit $missing

  changeset-check:
    name: Changeset check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changeset on source changes
        run: |
          changed=$(git diff --name-only origin/main...HEAD | grep '^packages/' | grep -v '^packages/_template' | grep '/src/' || true)
          changesets=$(git diff --name-only origin/main...HEAD | grep '^\.changeset/' || true)
          if [ -n "$changed" ] && [ -z "$changesets" ]; then
            echo "⚠️  Source files changed in packages/ but no changeset found."
            echo "Run 'pnpm changeset' to document your change before merging."
          else
            echo "✅ Changeset present or no source changes detected."
          fi

  publish:
    name: Publish to npm
    needs: [test, docs-check]
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' &&
       github.ref == 'refs/heads/main' &&
       startsWith(github.event.head_commit.message, 'release:')) ||
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main')

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npm for Trusted Publishing
        run: npm config set //registry.npmjs.org/:_authToken ""

      - name: Parse package from commit message
        id: parse
        env:
          INPUT_PKG: ${{ github.event.inputs.package }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -n "$INPUT_PKG" ]; then
            pkg="$INPUT_PKG"
          else
            pkg=$(echo "$COMMIT_MSG" | sed -E 's/^release: ([a-z0-9@/_-]+).*/\1/')
          fi
          echo "package=$pkg" >> $GITHUB_OUTPUT
          echo "Publishing package: $pkg"

      - name: Build package
        run: pnpm --filter ${{ steps.parse.outputs.package }} build

      - name: Publish package
        working-directory: packages/${{ steps.parse.outputs.package }}
        run: npm publish --access public --provenance
