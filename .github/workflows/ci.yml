name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm --filter cmd-table build && pnpm --filter '@cmd-table/reporter-core' build && pnpm -r build

      - name: Syntax check
        run: |
          shopt -s globstar
          for f in packages/*/dist/**/*.js; do
            node -c "$f"
          done

      - name: Run all tests
        run: pnpm -r test

      - name: CLI smoke test
        run: node packages/cmd-table/dist/cli.js --help

  docs-check:
    name: Docs check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check each package has a README
        run: |
          missing=0
          for pkg in packages/*/; do
            name=$(node -e "try{const p=require('./$pkg/package.json');process.stdout.write(p.private?'skip':p.name)}catch(e){process.stdout.write('skip')}")
            if [ "$name" = "skip" ]; then
              continue
            fi
            if [ ! -f "$pkg/README.md" ]; then
              echo "❌ Missing README.md in $pkg (package: $name)"
              missing=1
            else
              echo "✅ $pkg has README.md"
            fi
          done
          exit $missing

  changeset-check:
    name: Changeset check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require changeset for source changes
        run: |
          changed=$(git diff --name-only origin/main...HEAD | grep '^packages/' | grep -v '^packages/_template' | grep '/src/' || true)
          changesets=$(git diff --name-only origin/main...HEAD | grep '^\.changeset/[^/]*\.md$' | grep -v 'README\.md' || true)
          if [ -n "$changed" ] && [ -z "$changesets" ]; then
            echo "::error::Source files changed in packages/ but no changeset found."
            echo "::error::Run 'pnpm changeset' to document your change before merging."
            exit 1
          fi
          echo "✅ Changeset present or no source changes detected."

  release:
    name: Release
    needs: [test, docs-check]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Upgrade npm CLI for Trusted Publishing OIDC support
        run: npm install -g npm@latest

      - name: Remove auth token from npmrc (let OIDC Trusted Publishing take over)
        run: echo "registry=https://registry.npmjs.org/" > "$NPM_CONFIG_USERCONFIG"

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          version: pnpm run version-packages
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
