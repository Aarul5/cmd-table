name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (e.g. cmd-table)'
        required: false
        type: string

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Syntax check
        run: |
          shopt -s globstar
          for f in packages/*/dist/**/*.js; do
            node -c "$f"
          done

      - name: Run all tests
        run: pnpm -r test

      - name: CLI smoke test
        run: node packages/cmd-table/dist/cli.js --help

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' &&
       github.ref == 'refs/heads/main' &&
       startsWith(github.event.head_commit.message, 'release:')) ||
      github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Parse package from commit message
        id: parse
        run: |
          input_pkg="${{ github.event.inputs.package }}"
          commit_msg="${{ github.event.head_commit.message }}"
          if [ -n "$input_pkg" ]; then
            pkg="$input_pkg"
          else
            pkg=$(echo "$commit_msg" | sed -E 's/^release: ([a-z0-9@/_-]+).*/\1/')
          fi
          echo "package=$pkg" >> $GITHUB_OUTPUT
          echo "Publishing package: $pkg"

      - name: Build package
        run: pnpm --filter ${{ steps.parse.outputs.package }} build

      - name: Publish package
        run: pnpm --filter ${{ steps.parse.outputs.package }} publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
