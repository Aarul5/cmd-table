<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="100%" stop-color="#0c1424"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="480" height="320" rx="20" fill="url(#bg)"/>

  <!-- traffic lights -->
  <circle cx="28" cy="28" r="6" fill="#ff5f57"/>
  <circle cx="48" cy="28" r="6" fill="#febc2e"/>
  <circle cx="68" cy="28" r="6" fill="#28c840"/>

  <!-- table -->
  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#d4d4d4">
    <text x="32" y="80">╭─────────┬──────────┬────────╮</text>
    <text x="32" y="100" fill="#e879f9" font-weight="700">│ Name    │ Role     │ Status │</text>
    <text x="32" y="120">├─────────┼──────────┼────────┤</text>
    <text x="32" y="140">│ Alice   │ Engineer │ <tspan fill="#22d3ee">Active</tspan> │</text>
    <text x="32" y="160">│ Bob     │ Designer │ <tspan fill="#fbbf24">Away</tspan>   │</text>
    <text x="32" y="180">│ Charlie │ PM       │ <tspan fill="#22d3ee">Active</tspan> │</text>
    <text x="32" y="200">╰─────────┴──────────┴────────╯</text>
  </g>

  <!-- progress bar row -->
  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="13">
    <text x="32" y="240" fill="#9ca3af">coverage  </text>
    <text x="124" y="240" fill="#e879f9">████████</text>
    <text x="200" y="240" fill="#3f3f46">▒▒</text>
    <text x="222" y="240" fill="#d4d4d4">82%</text>
  </g>

  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="13">
    <text x="32" y="262" fill="#9ca3af">latency   </text>
    <text x="124" y="262" fill="#22d3ee">▁▂▃▅▇▆▄▃</text>
    <text x="222" y="262" fill="#d4d4d4">42ms</text>
  </g>

  <!-- accent underline -->
  <rect x="32" y="280" width="80" height="3" rx="1.5" fill="url(#accent)"/>
</svg>
